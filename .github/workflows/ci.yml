name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pytest
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f pyproject.toml ]   && pip install -e . || true
      - name: Run tests
        run: pytest -v
